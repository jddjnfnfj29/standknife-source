name: StandKnife Heavy Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Freeing up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc

      - name: Run Heavy Docker Build
        # Используем версию 2022.3, она самая стабильная для этого метода
        run: |
          docker run --rm \
            -v $(pwd):/project \
            unitygroup/editor:ubuntu-2022.3.7f1-android-3 \
            bash -c "unity-editor \
              -batchmode \
              -nographics \
              -projectPath /project \
              -buildTarget Android \
              -executeMethod UnityEditor.BuildPlayerWindow.BuildPlayer \
              -quit \
              -ignore-network-errors \
              -logFile /dev/stdout"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StandKnife-Hacker-APK
          path: ./*.apk
