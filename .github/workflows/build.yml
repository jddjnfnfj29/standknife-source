name: StandKnife Final
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          # Мы не используем UNITY_LICENSE, пробуем прорваться через логин
        with:
          targetPlatform: Android
          androidAppBundle: false
          # Указываем версию явно, чтобы он не искал её сам
          unityVersion: 2022.3.7f1 
          # Если проект лежит не в корне, укажи папку тут (например, unity-project)
          projectPath: . 

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: StandKnife-APK
          path: build/Android/*.apk
