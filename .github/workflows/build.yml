name: StandKnife Final Victory
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run Build inside Unity Container
        # Используем образ, который точно скачается
        run: |
          docker run --rm \
            -v $(pwd):/project \
            unityci/editor:ubuntu-2022.3.7f1-android-3 \
            bash -c "unity-editor \
              -batchmode \
              -nographics \
              -projectPath /project \
              -buildTarget Android \
              -buildAndroidPlayer /project/StandKnife.apk \
              -quit \
              -logFile /dev/stdout"

      - name: Search and Upload APK
        if: always() # Загрузить даже если были ошибки
        uses: actions/upload-artifact@v4
        with:
          name: StandKnife-APK
          path: ./*.apk
          name: StandKnife-Hacker-APK
          path: ./*.apk
