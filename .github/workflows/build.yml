name: StandKnife Ghost Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build APK (Bypass Mode)
        # Мы используем образ CI, но запускаем его через чистый Docker
        run: |
          docker run --rm \
            -v $(pwd):/project \
            unityci/editor:ubuntu-2022.3.7f1-android-3 \
            bash -c "unity-editor \
              -batchmode \
              -nographics \
              -projectPath /project \
              -buildTarget Android \
              -executeMethod UnityEditor.BuildPlayerWindow.BuildPlayer \
              -manualLicenseFile /project/*.alf \
              -quit \
              -logFile /dev/stdout" || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StandKnife-APK
          path: "**/*.apk"
