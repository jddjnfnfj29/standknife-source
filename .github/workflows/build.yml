name: StandKnife Final Attempt
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build APK
        run: |
          docker run --rm \
            -v $(pwd):/project \
            unityci/editor:ubuntu-2022.3.7f1-android-3 \
            bash -c "unity-editor \
              -batchmode \
              -nographics \
              -projectPath /project \
              -buildTarget Android \
              -quit \
              -nolicense \
              -logFile /dev/stdout & sleep 60; kill $!" || true

      - name: Upload Anything
        uses: actions/upload-artifact@v4
        with:
          name: Build-Logs
          path: "**/*.log"
